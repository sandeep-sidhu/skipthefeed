services:
  skipthefeed:
    build: .
    container_name: skipthefeed
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      - ./data:/data
    environment:
      - SKIPTHEFEED_DATA_DIR=/data
      - SKIPTHEFEED_PORT=3333
      # Optional: Ollama AI integration
      # - OLLAMA_ENABLED=true
      # - OLLAMA_URL=http://ollama:11434
      # - OLLAMA_MODEL=mistral:7b
      # - OLLAMA_USERNAME=
      # - OLLAMA_PASSWORD=
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
