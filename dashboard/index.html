        .container {

        .header {

            padding: 30px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 30px;

        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #22c55e, #3b82f6);
            -webkit-background-clip: text;

        .header p {

            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;

            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .status-dot.disconnected {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .status-dot.pending {
            background: #f59e0b;

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: 0.3s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: #e2e8f0;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle input:checked + .toggle-slider {
            background-color: #22c55e;
        }

        .toggle input:checked + .toggle-slider:before {
            transform: translateX(22px);

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // QR Code component using API
        function QRCodeImage({ data, size = 256 }) {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(data)}`;
            return <img src={qrUrl} alt="QR Code" style={{ background: 'white', padding: '16px', borderRadius: '12px' }} />;
        }

        // Instagram Setup Component
        function InstagramSetup({ disabled, uploadMessage, fileInputRef, onFileUpload, dragging, setDragging }) {
            const [sessionId, setSessionId] = useState('');
            const [showAdvanced, setShowAdvanced] = useState(false);
            const [submitting, setSubmitting] = useState(false);
            const [localMessage, setLocalMessage] = useState(null);

            const handleSessionSubmit = async () => {
                if (!sessionId.trim()) {
                    setLocalMessage({ type: 'error', text: 'Please enter a session ID' });
                    return;
                }

                setSubmitting(true);
                setLocalMessage(null);

                try {
                    const res = await fetch('/api/instagram-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sessionId: sessionId.trim() })

                        setLocalMessage({ type: 'success', text: 'Instagram session saved!' });

                    } else {
                        const err = await res.text();
                        setLocalMessage({ type: 'error', text: err || 'Failed to save session' });
                    }
                } catch (err) {
                    setLocalMessage({ type: 'error', text: 'Failed to save session' });

                    setSubmitting(false);

        function SettingsPanel({ settings, onSave, onResetWelcome, onClose, message }) {

                welcomeMessageEnabled: true,

            const [localSettings, setLocalSettings] = useState(settings || defaultSettings);

            // Password change state

            const [newPassword, setNewPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [passwordMessage, setPasswordMessage] = useState(null);
            const [changingPassword, setChangingPassword] = useState(false);

            useEffect(() => {
                if (settings) {
                    setLocalSettings(settings);
                }
            }, [settings]);

            const handleSave = async () => {
                setSaving(true);
                await onSave(localSettings);
                setSaving(false);
            };

            const handlePasswordChange = async () => {
                setPasswordMessage(null);

                if (!currentPassword || !newPassword || !confirmPassword) {
                    setPasswordMessage({ type: 'error', text: 'Please fill in all password fields' });
                    return;
                }

                if (newPassword !== confirmPassword) {
                    setPasswordMessage({ type: 'error', text: 'New passwords do not match' });
                    return;
                }

                if (newPassword.length < 4) {
                    setPasswordMessage({ type: 'error', text: 'New password must be at least 4 characters' });
                    return;
                }

                setChangingPassword(true);

                try {
                    const res = await fetch('/api/auth/password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            currentPassword: currentPassword,
                            newPassword: newPassword
                        })
                    });

                    if (res.ok) {
                        setPasswordMessage({ type: 'success', text: 'Password changed successfully!' });
                        setCurrentPassword('');
                        setNewPassword('');
                        setConfirmPassword('');
                        setTimeout(() => {
                            setShowPasswordChange(false);
                            setPasswordMessage(null);
                        }, 2000);
                    } else {
                        const err = await res.text();
                        setPasswordMessage({ type: 'error', text: err || 'Failed to change password' });
                    }
                } catch (err) {
                    setPasswordMessage({ type: 'error', text: 'Failed to change password' });
                } finally {
                    setChangingPassword(false);
                }
            };

            if (!localSettings) {
                return null;
            }

            return (

                    <div className="settings-panel" onClick={e => e.stopPropagation()}>

                                    <span className="toggle-slider"></span>
                                </label>
                            </div>

                            {/* Welcome Message Toggle */}

                                <div className="setting-info">
                                    <label className="setting-label">Welcome Message</label>
                                    <p className="setting-desc">Send a one-time message after first download in each chat</p>
                                </div>
                                <label className="toggle">
                                    <input
                                        type="checkbox"
                                        checked={localSettings.welcomeMessageEnabled || false}
                                        onChange={e => setLocalSettings(prev => ({ ...prev, welcomeMessageEnabled: e.target.checked }))}
                                    />
                                    <span className="toggle-slider"></span>
                                </label>
                            </div>

                            {/* Welcome Message Text */}
                            {localSettings.welcomeMessageEnabled && (
                                <div className="setting-item-full">
                                    <label className="setting-label">Welcome Message Text</label>
                                    <textarea
                                        className="setting-textarea"
                                        value={localSettings.welcomeMessageText || ''}
                                        onChange={e => setLocalSettings(prev => ({ ...prev, welcomeMessageText: e.target.value }))}
                                        rows={4}
                                        placeholder="Enter your welcome message..."
                                    />
                                    <div className="setting-hint">
                                        Status: {(settings && settings.welcomeMessagesSentCount > 0) ?
                                            <span style={{color: '#22c55e'}}>Sent to {settings.welcomeMessagesSentCount} chat{settings.welcomeMessagesSentCount !== 1 ? 's' : ''}</span> :
                                            <span style={{color: '#f59e0b'}}>Will send on first download in each chat</span>
                                        }
                                        {(settings && settings.welcomeMessagesSentCount > 0) && (

                                                Reset All

                            {/* Password Change Section */}

                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <div>
                                        <label className="setting-label">Change Password</label>
                                        <p className="setting-desc">Update your dashboard login password</p>
                                    </div>
                                    {!showPasswordChange && (
                                        <button className="btn btn-sm" onClick={() => setShowPasswordChange(true)}>
                                            Change
                                        </button>
                                    )}
                                </div>

                                {showPasswordChange && (
                                    <div style={{marginTop: '16px', background: '#0f172a', padding: '16px', borderRadius: '8px'}}>
                                        <div className="form-group" style={{marginBottom: '12px'}}>
                                            <label className="form-label" style={{fontSize: '0.875rem'}}>Current Password</label>
                                            <input
                                                type="password"
                                                className="form-input"
                                                value={currentPassword}
                                                onChange={e => setCurrentPassword(e.target.value)}
                                                disabled={changingPassword}
                                                style={{fontSize: '0.875rem', padding: '10px 12px'}}
                                            />
                                        </div>
                                        <div className="form-group" style={{marginBottom: '12px'}}>
                                            <label className="form-label" style={{fontSize: '0.875rem'}}>New Password</label>
                                            <input
                                                type="password"
                                                className="form-input"
                                                value={newPassword}
                                                onChange={e => setNewPassword(e.target.value)}
                                                disabled={changingPassword}
                                                style={{fontSize: '0.875rem', padding: '10px 12px'}}
                                            />
                                        </div>
                                        <div className="form-group" style={{marginBottom: '16px'}}>
                                            <label className="form-label" style={{fontSize: '0.875rem'}}>Confirm New Password</label>
                                            <input
                                                type="password"
                                                className="form-input"
                                                value={confirmPassword}
                                                onChange={e => setConfirmPassword(e.target.value)}
                                                disabled={changingPassword}
                                                style={{fontSize: '0.875rem', padding: '10px 12px'}}
                                            />
                                        </div>

                                        {passwordMessage && (
                                            <div className={passwordMessage.type === 'success' ? 'success-box' : 'error-box'} style={{marginBottom: '12px'}}>
                                                {passwordMessage.text}
                                            </div>
                                        )}

                                        <div style={{display: 'flex', gap: '10px'}}>
                                            <button
                                                className="btn btn-sm"
                                                onClick={() => {
                                                    setShowPasswordChange(false);
                                                    setCurrentPassword('');
                                                    setNewPassword('');
                                                    setConfirmPassword('');
                                                    setPasswordMessage(null);
                                                }}
                                                disabled={changingPassword}
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                className="btn btn-primary btn-sm"
                                                onClick={handlePasswordChange}
                                                disabled={changingPassword}
                                            >
                                                {changingPassword ? 'Changing...' : 'Update Password'}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {message && (
                                <div className={message.type === 'success' ? 'success-box' : 'error-box'}>
                                    {message.text}
                                </div>
                            )}
                        </div>

                        <div className="settings-footer">
                            <button className="btn" onClick={onClose}>Cancel</button>
                            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
                                {saving ? 'Saving...' : 'Save Settings'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            // Auth state
            const [authStatus, setAuthStatus] = useState({ setupDone: null, loggedIn: false });
            const [authLoading, setAuthLoading] = useState(true);

            const [status, setStatus] = useState({
                connected: false,
                authenticated: false,
                qrCode: '',
                instagramCookiesSet: false
            });
            const [stats, setStats] = useState({ total: 0, byUser: [], byPlatform: {} });
            const [logs, setLogs] = useState([]);
            const [lastUpdate, setLastUpdate] = useState(new Date());
            const [uploadMessage, setUploadMessage] = useState(null);
            const [dragging, setDragging] = useState(false);
            const [showSetup, setShowSetup] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [botSettings, setBotSettings] = useState({
                autoDownloadEnabled: true,
                welcomeMessageEnabled: true,
                welcomeMessageText: '',
                welcomeMessagesSentCount: 0
            });
            const [settingsMessage, setSettingsMessage] = useState(null);
            const logsRef = useRef(null);
            const fileInputRef = useRef(null);

            // Check auth status
            const checkAuth = async () => {
                try {
                    const res = await fetch('/api/auth/status');
                    const data = await res.json();
                    setAuthStatus(data);
                } catch (err) {
                    console.error('Failed to check auth:', err);
                } finally {
                    setAuthLoading(false);
                }
            };

            useEffect(() => {
                checkAuth();
            }, []);

            // Fetch status (only when logged in)
            useEffect(() => {
                if (!authStatus.loggedIn && authStatus.setupDone) return;

                const fetchStatus = async () => {
                    try {
                        const res = await fetch('/api/status');
                        if (res.status === 401) {
                            setAuthStatus(prev => ({ ...prev, loggedIn: false }));
                            return;
                        }
                        const data = await res.json();
                        setStatus(data);
                    } catch (err) {
                        console.error('Failed to fetch status:', err);
                    }
                };

                fetchStatus();
                const interval = setInterval(fetchStatus, 3000);
                return () => clearInterval(interval);
            }, [authStatus.loggedIn, authStatus.setupDone]);

            // Fetch stats (only when logged in)
            useEffect(() => {
                if (!authStatus.loggedIn && authStatus.setupDone) return;

                const fetchStats = async () => {
                    try {
                        const res = await fetch('/api/stats/today');
                        if (res.status === 401) {
                            setAuthStatus(prev => ({ ...prev, loggedIn: false }));
                            return;
                        }
                        const data = await res.json();
                        setStats(data);
                        setLastUpdate(new Date());
                    } catch (err) {
                        console.error('Failed to fetch stats:', err);
                    }
                };

                fetchStats();
                const interval = setInterval(fetchStats, 10000);
                return () => clearInterval(interval);
            }, [authStatus.loggedIn, authStatus.setupDone]);

            // SSE for logs (only when logged in)
            useEffect(() => {
                if (!authStatus.loggedIn && authStatus.setupDone) return;

                const eventSource = new EventSource('/api/logs');

                eventSource.onmessage = (event) => {
                    try {
                        const logEntry = JSON.parse(event.data);
                        setLogs(prev => {
                            const newLogs = [...prev, logEntry];
                            if (newLogs.length > 500) {
                                return newLogs.slice(-500);
                            }
                            return newLogs;
                        });
                    } catch (err) {
                        console.error('Failed to parse log:', err);
                    }
                };

                eventSource.onerror = () => {
                    console.error('SSE connection error');
                    eventSource.close();
                };

                return () => eventSource.close();
            }, [authStatus.loggedIn, authStatus.setupDone]);

            // Logout handler
            const handleLogout = async () => {
                try {
                    await fetch('/api/auth/logout', { method: 'POST' });
                    setAuthStatus({ setupDone: true, loggedIn: false });
                    setLogs([]);
                } catch (err) {
                    console.error('Logout failed:', err);
                }
            };

            // Fetch bot settings
            const fetchSettings = async () => {
                try {
                    const res = await fetch('/api/settings');
                    if (res.ok) {
                        const data = await res.json();
                        setBotSettings(data);
                    }
                } catch (err) {
                    console.error('Failed to fetch settings:', err);
                }
            };

            useEffect(() => {
                if (authStatus.loggedIn) {
                    fetchSettings();
                }
            }, [authStatus.loggedIn]);

            // Save bot settings
            const saveSettings = async (newSettings) => {
                try {
                    const res = await fetch('/api/settings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newSettings)
                    });
                    if (res.ok) {
                        setBotSettings(prev => ({ ...prev, ...newSettings }));
                        setSettingsMessage({ type: 'success', text: 'Settings saved!' });
                        setTimeout(() => setSettingsMessage(null), 3000);
                    } else {
                        setSettingsMessage({ type: 'error', text: 'Failed to save settings' });
                    }
                } catch (err) {
                    setSettingsMessage({ type: 'error', text: 'Failed to save settings' });
                }
            };

            // Reset welcome message
            const resetWelcomeMessage = async () => {
                try {
                    const res = await fetch('/api/settings/reset-welcome', { method: 'POST' });
                    if (res.ok) {
                        setBotSettings(prev => ({ ...prev, welcomeMessagesSentCount: 0 }));
                        setSettingsMessage({ type: 'success', text: 'Welcome messages reset - will be sent again in all chats' });
                        setTimeout(() => setSettingsMessage(null), 3000);
                    }
                } catch (err) {
                    setSettingsMessage({ type: 'error', text: 'Failed to reset welcome messages' });
                }
            };

            // Auto-scroll logs
            useEffect(() => {
                if (logsRef.current) {
                    logsRef.current.scrollTop = logsRef.current.scrollHeight;
                }
            }, [logs]);

            const handleFileUpload = async (file) => {
                if (!file) return;

                try {
                    const text = await file.text();
                    const res = await fetch('/api/cookies', {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: text
                    });

                    if (res.ok) {
                        setUploadMessage({ type: 'success', text: 'Cookies uploaded successfully!' });
                        setTimeout(() => setUploadMessage(null), 5000);
                    } else {
                        const err = await res.text();
                        setUploadMessage({ type: 'error', text: err });
                    }
                } catch (err) {
                    setUploadMessage({ type: 'error', text: 'Failed to upload cookies' });
                }
            };

            const handleDeleteCookies = async () => {
                if (!confirm('Are you sure you want to delete Instagram cookies?')) return;

                try {
                    const res = await fetch('/api/cookies', { method: 'DELETE' });
                    if (res.ok) {
                        setUploadMessage({ type: 'success', text: 'Cookies deleted!' });
                        setTimeout(() => setUploadMessage(null), 5000);
                    }
                } catch (err) {
                    setUploadMessage({ type: 'error', text: 'Failed to delete cookies' });
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setDragging(false);
                const file = e.dataTransfer.files[0];
                if (file) handleFileUpload(file);
            };

            const getPlatformClass = (platform) => {
                const p = platform.toLowerCase();
                if (p.includes('instagram')) return 'platform-instagram';
                if (p.includes('twitter')) return 'platform-twitter';
                if (p.includes('facebook')) return 'platform-facebook';
                if (p.includes('youtube')) return 'platform-youtube';
                return '';
            };

            // Show loading while checking auth
            if (authLoading) {
                return (
                    <div className="auth-container">
                        <div className="loading-box">
                            <div className="spinner"></div>
                            <span>Loading...</span>
                        </div>
                    </div>
                );
            }

            // Show login if not logged in
            if (!authStatus.loggedIn) {
                return <Login onLoginSuccess={checkAuth} />;
            }

            // Show setup wizard if not WhatsApp authenticated OR if user clicked "Setup" button
            if (!status.authenticated || showSetup) {
                return (
                    <SetupWizard
                        status={status}
                        onFileUpload={handleFileUpload}
                        uploadMessage={uploadMessage}
                        dragging={dragging}
                        setDragging={setDragging}
                        fileInputRef={fileInputRef}
                        onComplete={() => setShowSetup(false)}
                    />
                );
            }

            return (
                <div className="container">
                    <div className="header">
                        <h1>SKIPTHEFEED</h1>
                        <p>Watch just the video, skip the feed</p>
                        <div className="header-buttons">
                            <button
                                className="btn"
                                style={{ background: '#334155', color: '#e2e8f0', border: '1px solid #475569' }}
                                onClick={() => setShowSetup(true)}
                                title="Setup"
                            >
                                Setup
                            </button>
                            <button
                                className="btn"
                                style={{ background: '#334155', color: '#e2e8f0', border: '1px solid #475569' }}
                                onClick={() => setShowSettings(true)}
                                title="Settings"
                            >
                                ⚙️ Settings
                            </button>
                            <button
                                className="btn"
                                style={{ background: '#334155', color: '#e2e8f0', border: '1px solid #475569' }}
                                onClick={handleLogout}
                                title="Logout"
                            >
                                Logout
                            </button>
                        </div>
                    </div>

                    {/* Settings Panel */}
                    {showSettings && (
                        <SettingsPanel
                            settings={botSettings}
                            onSave={saveSettings}
                            onResetWelcome={resetWelcomeMessage}
                            onClose={() => setShowSettings(false)}
                            message={settingsMessage}
                        />
                    )}

                    <div className="grid">
                        {/* Status Card */}
                        <div className="card">
                            <div className="card-title">Connection Status</div>
                            <div className="status-indicator">
                                <div className={`status-dot ${status.connected ? 'connected' : status.qrCode ? 'pending' : 'disconnected'}`}></div>
                                <span className="status-text">
                                    {status.connected ? 'Connected' : status.qrCode ? 'Awaiting Auth' : 'Disconnected'}
                                </span>
                            </div>
                        </div>

                        {/* Today's Downloads Card */}
                        <div className="card">
                            <div className="card-title">Today's Downloads</div>
                            <div className="stat-number">{stats.total}</div>
                            <div className="stat-label">Total Downloads</div>
                            <div className="platform-stats" style={{ marginTop: '16px' }}>
                                {Object.entries(stats.byPlatform).map(([platform, count]) => (
                                    <div key={platform} className="platform-stat">
                                        <span className={`platform-badge ${getPlatformClass(platform)}`}>
                                            {platform}
                                        </span>
                                        <span className="count">{count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Instagram Cookies Card (when authenticated) */}
                    {status.authenticated && (
                        <div className="card" style={{ marginBottom: '20px' }}>
                            <div className="card-title">Instagram Configuration</div>
                            {status.instagramCookiesSet ? (
                                <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                                    <div className="success-message" style={{ margin: 0, flex: 1 }}>
                                        Instagram cookies configured
                                    </div>
                                    <button className="btn btn-danger btn-sm" onClick={handleDeleteCookies}>
                                        Delete
                                    </button>
                                </div>
                            ) : (
                                <div>
                                    <p style={{ color: '#94a3b8', marginBottom: '12px' }}>
                                        Upload Instagram cookies to enable Instagram downloads.
                                    </p>
                                    <div
                                        className={`upload-area ${dragging ? 'dragging' : ''}`}
                                        onDrop={handleDrop}
                                        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
                                        onDragLeave={() => setDragging(false)}
                                        onClick={() => fileInputRef.current?.click()}
                                    >
                                        <input
                                            type="file"
                                            ref={fileInputRef}
                                            style={{ display: 'none' }}
                                            accept=".txt"
                                            onChange={(e) => handleFileUpload(e.target.files[0])}
                                        />
                                        Drop cookies.txt here or click to upload
                                    </div>
                                </div>
                            )}
                            {uploadMessage && (
                                <div className={uploadMessage.type === 'success' ? 'success-message' : 'error-message'}>
                                    {uploadMessage.text}
                                </div>
                            )}
                        </div>
                    )}

                    {/* Downloads by User */}
                    {stats.byUser.length > 0 && (
                        <div className="card" style={{ marginBottom: '20px' }}>
                            <div className="card-title">Downloads by User</div>
                            <div className="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>User</th>
                                            <th>Count</th>
                                            <th>Platforms</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {stats.byUser.map((user, idx) => (
                                            <tr key={idx}>
                                                <td>{user.chatName || 'Unknown'}</td>
                                                <td>{user.count}</td>
                                                <td>
                                                    {user.platforms.map((p, i) => (
                                                        <span key={i} className={`platform-badge ${getPlatformClass(p)}`}>
                                                            {p}
                                                        </span>
                                                    ))}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <div className="refresh-indicator">
                                Last updated: {lastUpdate.toLocaleTimeString()}
                            </div>
                        </div>
                    )}

                    {/* Live Logs */}
                    <div className="card logs-card">
                        <div className="card-title">Live Logs</div>
                        <div className="logs-container" ref={logsRef}>
                            {logs.length === 0 ? (
                                <div className="loading">Waiting for logs...</div>
                            ) : (
                                logs.map((log, idx) => (
                                    <div key={idx} className="log-entry">
                                        <span className="log-timestamp">[{log.timestamp}]</span>{' '}
                                        <span className={`log-level-${log.level}`}>[{log.level}]</span>{' '}
                                        <span className="log-message">{log.message}</span>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
