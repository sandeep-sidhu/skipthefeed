# Air configuration for hot-reloading
# Documentation: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
# Build command (disable VCS stamping for Docker, ignore vendor directory)
cmd = "go build -buildvcs=false -mod=mod -o ./tmp/skipthefeed ."
# Binary to run
bin = "./tmp/skipthefeed"
# Watch these file extensions
include_ext = ["go", "tpl", "tmpl", "html"]
# Exclude these directories
exclude_dir = ["assets", "tmp", "vendor", "data", "node_modules"]
# Exclude files matching these patterns
exclude_file = []
# Exclude unchanged files
exclude_unchanged = true
# Follow symlinks
follow_symlink = false
# Log file location (empty = stdout)
log = ""
# Poll interval for file changes (ms) - useful for Docker on some systems
poll = false
poll_interval = 500
# Delay before rebuilding after change detected (ms)
delay = 1000
# Stop running old binary before building new one
stop_on_error = true
# Send interrupt signal before killing process
send_interrupt = true
# Delay before killing process after interrupt (ms)
kill_delay = 500

[log]
# Show log time
time = true
# Only show main log (silences watcher log)
main_only = false

[color]
# Customize colors
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true
